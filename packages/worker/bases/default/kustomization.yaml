apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - serviceaccount.yaml
  - clusterrolebinding.yaml
  - deployment.yaml
secretGenerator:
  - name: confighub-worker-secret
    envs:
      - confighub-worker-secret.env.secret
generatorOptions:
  disableNameSuffixHash: true
