apiVersion: apps/v1
kind: Deployment
metadata:
  name: confighubplaceholder
spec:
  replicas: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      app: confighubplaceholder
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: confighubplaceholder
    spec:
      serviceAccountName: confighub-worker
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/confighubai/confighub-worker:latest
          imagePullPolicy: Always
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          envFrom:
            - configMapRef:
                name: confighub-worker-env
            - secretRef:
                name: confighub-worker-secret
