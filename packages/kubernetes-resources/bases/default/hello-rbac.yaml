apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-app
  namespace: confighubplaceholder
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-app
  namespace: confighubplaceholder
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-app
  namespace: confighubplaceholder
subjects:
  - kind: ServiceAccount
    name: hello-app
    namespace: confighubplaceholder
roleRef:
  kind: Role
  name: hello-app
  apiGroup: rbac.authorization.k8s.io
