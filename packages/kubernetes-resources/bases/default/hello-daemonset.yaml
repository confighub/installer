apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: hello-exporter
  namespace: confighubplaceholder
  labels:
    app: hello-exporter
spec:
  selector:
    matchLabels:
      app: hello-exporter
  template:
    metadata:
      labels:
        app: hello-exporter
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.1
          ports:
            - containerPort: 9100
              hostPort: 9100
          volumeMounts:
            - name: proc
              mountPath: /host/proc
              readOnly: true
            - name: sys
              mountPath: /host/sys
              readOnly: true
      volumes:
        - name: proc
          hostPath:
            path: /proc
        - name: sys
          hostPath:
            path: /sys
      tolerations:
        - operator: Exists
