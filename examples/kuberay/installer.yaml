apiVersion: installer.confighub.com/v1alpha1
kind: Package
metadata:
  name: kuberay
  version: 1.6.1
spec:
  bases:
    - name: default
      path: bases/default
      default: true
      description: |
        KubeRay operator and its four CRDs (RayCluster, RayJob, RayService, RayCronJob),
        vendored from ray-project/kuberay v1.6.1 (ray-operator/config).

  components:
    - name: sample-cluster
      path: components/sample-cluster
      description: A minimal RayCluster for kicking the tires.

  # Cluster-scoped resources this package installs. Other packages can declare
  # these as externalRequires and the installer will know they will be satisfied.
  provides:
    - { kind: CRD, name: rayclusters.ray.io }
    - { kind: CRD, name: rayjobs.ray.io }
    - { kind: CRD, name: rayservices.ray.io }
    - { kind: CRD, name: raycronjobs.ray.io }

  # The operator runs as a single replica with leader election; only one
  # instance per cluster should hold the lease.
  clusterSingleton:
    - kind: leader-election-lease
      name: kuberay-operator

  transformers:
    # Rename the operator's Namespace resource, set metadata.namespace on
    # every namespace-scoped resource, and upsert subjects[].namespace on
    # every ServiceAccount subject in the operator's RoleBinding and
    # ClusterRoleBinding. The namespace comes from the wizard's --namespace
    # flag.
    - toolchain: Kubernetes/YAML
      whereResource: ""
      description: Set the namespace on every namespaced resource and RBAC ServiceAccount subject.
      invocations:
        - name: set-namespace
          args: ["{{ .Namespace }}"]

    # Rewrite the operator image to a fully-qualified, version-pinned ref.
    # Upstream manager.yaml ships `image: kuberay/operator` (no registry, no
    # tag); the kuberay project publishes to quay.io, not Docker Hub. Bump
    # the tag in lockstep with metadata.version above when refreshing.
    - toolchain: Kubernetes/YAML
      whereResource: "ConfigHub.ResourceType = 'apps/v1/Deployment'"
      description: Set the kuberay-operator container image.
      invocations:
        - name: set-container-image
          args: ["kuberay-operator", "quay.io/kuberay/operator:v1.6.1"]
